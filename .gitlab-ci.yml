image: "${GITLAB_DOCKER_PROXY}/eclipse-temurin:25-jdk-alpine"

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx4g -XX:+UseG1GC -XX:+TieredCompilation -XX:TieredStopAtLevel=1 -XX:CICompilerCount=2"
  GITLAB_DOCKER_PROXY: "gitlab.education.tbank.ru:443/backend-academy-java-2025/lecture-materials/dependency_proxy/containers"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_REF_PROTECTED == 'true'
    - if: $CI_COMMIT_BRANCH == 'master'

stages:
  - build
  - lint
  - test

cache:
  key: "maven-cache-$CI_PROJECT_ID"
  paths:
    - .m2/repository/

build:
  stage: build
  timeout: 20m
  script:
    - ./mvnw package -T 1C -DskipTests=true -Djacoco.skip=true
      -Denforcer.skip=true -Dflatten.skip=true
      -Dmodernizer.skip=true -Dspotbugs.skip=true -Dpmd.skip=true
      --projects '!build-report-aggregate' -am

lint:
  stage: lint
  needs:
    - build
  script:
    - ./mvnw compile -T 1C -am spotless:check modernizer:modernizer spotbugs:check pmd:check pmd:cpd-check

test:
  stage: test
  needs:
    - build
  services:
    - name: docker:29.0.1-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "${DOCKER_TLS_CERTDIR}/client"
    TESTCONTAINERS_HUB_IMAGE_NAME_PREFIX: "${GITLAB_DOCKER_PROXY}/"
  tags:
    - dind
  before_script:
    - apk add --no-cache docker-cli
    - echo "$CI_JOB_TOKEN" | docker login gitlab.education.tbank.ru:443 -u gitlab-ci-token --password-stdin
  script:
    - ./mvnw verify -Dgroups='!integration'
