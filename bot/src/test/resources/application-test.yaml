app:
  scrapper:
    base-url: http://localhost
  telegram:
    url: ${wiremock.server.baseUrl}/bot
    token: test-token
    update-listener-sleep: 1s
    debug: true
  message-transport:
    type: HTTP
  kafka:
    bootstrap-servers: localhost:9092
    schema-registry-url: http://localhost:8085
    topic: link-updates-test
    group-id: test-bot-group
    dlq-topic: link-updates-test.DLQ
    max-retries: 1
    retry-backoff-ms: 100