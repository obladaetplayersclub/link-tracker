server:
  port: 8081

spring:
  application:
    name: scrapper
  config:
    import: "optional:file:scrapper/.env[.properties]"
  datasource:
    url: jdbc:postgresql://localhost:5432/scrapper
    username: scrapper
    password: scrapper
  liquibase:
    change-log: classpath:migrations/master.xml
  jpa:
    hibernate:
      ddl-auto: none

app:
  database-access-type: ORM
  link-updater:
    batch-size: 100
    thread-count: 4
  message-transport:
    type: KAFKA
  kafka:
    bootstrap-servers: localhost:9092,localhost:9094,localhost:9096
    topic: link-updates
    partitions: 3
    replication-factor: 3
  bot:
    base-url: http://localhost:8080
  scheduler:
    interval: PT30S
  stackoverflow:
    key: ${STACKOVERFLOW_KEY} # Use env variable. DO NOT KEEP TOKEN HERE
    access-token: ${STACKOVERFLOW_ACCESS_KEY} # Use env variable. DO NOT KEEP TOKEN HERE
  github:
    token: ${GITHUB_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
