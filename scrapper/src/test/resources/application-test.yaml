spring:
  liquibase:
    change-log: classpath:migrations/master.xml
  jpa:
    hibernate:
      ddl-auto: none

app:
  database-access-type: SQL
  message-transport:
    type: HTTP
  kafka:
    bootstrap-servers: localhost:9092
    topic: link-updates-test
    schema-registry-url: http://localhost:8085
    partitions: 1
    replication-factor: 1
  bot:
    base-url: http://localhost
  scheduler:
    interval: PT1H
  github:
    base-url: http://localhost
    token: test-token
  stackoverflow:
    base-url: http://localhost
    key: test-key
    access-token: test-access-token